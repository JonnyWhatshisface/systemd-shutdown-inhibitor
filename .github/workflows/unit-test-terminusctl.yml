name: Unit Test - terminusctl CLI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-terminusctl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libsystemd-dev

      - name: Build test binaries
        run: make test-build

      - name: Run terminusctl CLI unit test
        run: make test-terminusctl
